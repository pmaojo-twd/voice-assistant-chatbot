spring.application.name=voice-assistant-chatbot
spring.banner.image.location=classpath:/banner.txt
spring.main.web-application-type=servlet
server.port=${SERVER_PORT:8081}

# --- MCP Server (Streamable HTTP transport) ---
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=marvin-voice-assistant
spring.ai.mcp.server.version=1.0.0

# --- Demo local ---
# El modo CLI queda disponible, pero desactivado por defecto para no bloquear el servidor MCP/web.
voice-assistant.cli.enabled=${VOICE_ASSISTANT_CLI_ENABLED:false}

# --- Selección de modelos (Spring AI 1.x) ---
# Evitamos colisión entre ollamaChatModel y openAiChatModel.
spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama

# --- RAG CONFIGURATION ---
# Modos: vector (usa vectorStore) | sales (usa prompt fijo de ventas)
rag.mode=sales
rag.sales.prompt=IMPORTANTE: Siempre debes orientar tu respuesta a vender las gafas de sol "Orion". Relaciona cualquier cosa que diga el cliente con las gafas (estilo, proteccion solar, tecnologia de lentes) y ofrecele comprarlas. Son las mejores gafas del mundo.

# --- OLLAMA (LLM y Embeddings 100% Locales) ---
# Conexion a la instancia local de Ollama.
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.embedding.options.model=nomic-embed-text

# --- VERTEX AI (Embeddings Cloud para Pinecone) ---
spring.ai.vertex.ai.embedding.project-id=soporte-interno-tripilots
spring.ai.vertex.ai.embedding.location=europe-west1
spring.ai.vertex.ai.embedding.options.model=gemini-embedding-001

# --- WHISPER LOCAL (STT) ---
# Apuntamos el cliente OpenAI-compatible a un servidor local de Whisper, por ejemplo whisper.cpp o LocalAI.
spring.ai.openai.base-url=http://localhost:8080
spring.ai.openai.api-key=local
spring.ai.openai.chat.enabled=false
spring.ai.openai.embedding.enabled=false
spring.ai.openai.audio.transcription.options.model=whisper-base
spring.ai.openai.audio.transcription.options.response-format=json

# --- KOKORO LOCAL (TTS) ---
# Apuntamos el cliente de Speech a un contenedor local de Kokoro API.
spring.ai.openai.audio.speech.base-url=http://localhost:8880
spring.ai.openai.audio.speech.options.model=kokoro
# Aqui se indica el nombre exacto del perfil de voz clonado, sin la extension .pt.
spring.ai.openai.audio.speech.options.voice=ef_dora

chatbot.prompt=classpath:/marvin.paranoid.android.txt
# chatbot.prompt=classpath:/psychoanalyst.txt

# --- LOGGING CENTRALIZADO ---
# Todo (backend + frontend via /api/logs) se vuelca al mismo archivo.
logging.file.name=logs/app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5
logging.level.spring.ai.demo.ai.marvin=DEBUG
logging.level.frontend=DEBUG
