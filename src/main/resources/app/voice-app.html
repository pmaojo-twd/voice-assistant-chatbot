<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvin - Voice Assistant</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f1f5f9;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
        }

        .mic-btn:hover {
            transform: scale(1.1);
            background: var(--primary-dark);
        }

        .mic-btn.active {
            animation: pulse 1.5s infinite;
            background: #ef4444;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .visualizer-container {
            height: 100px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .bar {
            width: 4px;
            background: var(--primary);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        .status-badge {
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card p-8 w-full max-w-md flex flex-col items-center gap-6">
        <h1 class="text-2xl font-semibold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
            Marvin Assistant
        </h1>

        <div id="status-container" class="flex flex-col items-center gap-2">
            <span id="status" class="text-lg font-medium">Desconectado</span>
            <span id="sub-status" class="text-sm text-gray-400">Pulsa el micro para empezar</span>
        </div>

        <div class="visualizer-container" id="visualizer">
            <!-- Bars will be added by JS -->
        </div>

        <button id="mic-btn" class="mic-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
        </button>

        <div id="history" class="w-full mt-4 max-h-32 overflow-y-auto text-sm text-gray-300 space-y-2">
            <!-- Previous interactions -->
        </div>

        <div class="flex gap-2">
            <span class="status-badge">Backend: Java</span>
            <span class="status-badge">VAD: Server-side</span>
        </div>
    </div>

    <script>
        // Log Forwarder
        function installLogForwarder(backendUrl) {
            const originalLog = console.log;
            const originalError = console.error;
            const originalDebug = console.debug;

            const sendLog = (level, args) => {
                const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
                fetch(`${backendUrl}/api/logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, message: `[voice-app.html] ${msg}` })
                }).catch(() => {});
            };

            console.log = (...args) => { originalLog(...args); sendLog('INFO', args); };
            console.error = (...args) => { originalError(...args); sendLog('ERROR', args); };
            console.debug = (...args) => { originalDebug(...args); sendLog('DEBUG', args); };
        }

        const params = new URLSearchParams(window.location.search);
        const PUBLIC_BACKEND = "https://marvin.pelayomaojo.es";
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const defaultLocal = `http://${window.location.hostname}:8081`;
        
        const backendBaseUrl = params.get('backend') || (isLocalhost ? defaultLocal : PUBLIC_BACKEND);
        
        installLogForwarder(backendBaseUrl);

        const wsUrl = backendBaseUrl.replace('http', 'ws') + '/ws/voice';
        
        const micBtn = document.getElementById('mic-btn');
        const statusEl = document.getElementById('status');
        const subStatusEl = document.getElementById('sub-status');
        const visualizer = document.getElementById('visualizer');
        const historyEl = document.getElementById('history');

        let socket = null;
        let audioContext = null;
        let scriptProcessor = null;
        let isStreaming = false;
        let isBusy = false;

        // Init Visualizer Bars
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '10px';
            visualizer.appendChild(bar);
        }

        function updateVisualizer(dataArray) {
            const bars = visualizer.querySelectorAll('.bar');
            const step = Math.floor(dataArray.length / bars.length);
            for (let i = 0; i < bars.length; i++) {
                const val = dataArray[i * step] / 128.0;
                const height = Math.max(10, val * 60);
                bars[i].style.height = `${height}px`;
            }
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                analyzer.fftSize = 64;
                source.connect(analyzer);

                // Use ScriptProcessor for easy PCM extraction and resampling (16kHz)
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                scriptProcessor.onaudioprocess = (e) => {
                    if (!isStreaming || isBusy) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Convert Float32 to Int16
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }

                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send(pcmData.buffer);
                    }

                    const dataArray = new Uint8Array(analyzer.frequencyBinCount);
                    analyzer.getByteFrequencyData(dataArray);
                    updateVisualizer(dataArray);
                };

                return true;
            } catch (err) {
                console.error("Audio init failed:", err);
                statusEl.textContent = "Error de Micro";
                subStatusEl.textContent = err.message;
                return false;
            }
        }

        function connect() {
            statusEl.textContent = "Conectando...";
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.textContent = "Conectado";
                subStatusEl.textContent = "Pulsa el micro para hablar";
                console.log("WebSocket connected");
            };

            socket.onmessage = async (event) => {
                const response = JSON.parse(event.data);
                if (response.status === 'success') {
                    console.log("Response received:", response.text);
                    addHistory(response.text);
                    isBusy = true;
                    statusEl.textContent = "Respondiendo…";
                    subStatusEl.textContent = response.text;
                    await playResponse(response.audio);
                    isBusy = false;
                    statusEl.textContent = "Escuchando…";
                    subStatusEl.textContent = "Listo";
                } else {
                    console.error("Server error:", response.message);
                }
            };

            socket.onclose = () => {
                statusEl.textContent = "Desconectado";
                micBtn.classList.remove('active');
                isStreaming = false;
                setTimeout(connect, 3000); // Reconnect
            };
        }

        async function toggleStreaming() {
            if (isStreaming) {
                isStreaming = false;
                micBtn.classList.remove('active');
                statusEl.textContent = "Conectado";
                subStatusEl.textContent = "Pausado";
            } else {
                if (!audioContext) {
                    const success = await initAudio();
                    if (!success) return;
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                isStreaming = true;
                micBtn.classList.add('active');
                statusEl.textContent = "Escuchando…";
                subStatusEl.textContent = "VAD en el servidor activo";
            }
        }

        async function playResponse(base64Audio) {
            return new Promise((resolve) => {
                const audioData = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
                const blob = new Blob([audioData], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.onended = resolve;
                audio.play();
            });
        }

        function addHistory(text) {
            const entry = document.createElement('div');
            entry.textContent = `> ${text}`;
            historyEl.prepend(entry);
        }

        micBtn.addEventListener('click', toggleStreaming);

        // Auto-connect on load
        connect();

    </script>

</body>
</html>
