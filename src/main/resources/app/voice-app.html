<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant - MCP App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .visualizer {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 20px 0;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: var(--primary);
            border-radius: 2px;
            transition: height 0.1s ease;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .sub-status {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--primary-glow);
            margin: 0 auto;
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .mic-button.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .initial-query {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: left;
        }

        .transcript {
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        /* SVG Icons */
        .icon { width: 32px; height: 32px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status" id="status">Voice Assistant</div>
        <div class="sub-status" id="sub-status">Initializing...</div>

        <div class="visualizer" id="visualizer">
            <!-- Bars will be generated by JS -->
        </div>

        <button class="mic-button" id="mic-btn">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>

        <div class="transcript" id="transcript"></div>

        <div class="initial-query" id="initial-query-container" style="display: none;">
            <strong>Contexto:</strong> <span id="initial-query"></span>
        </div>
    </div>

    <script type="module">
        import { App } from "https://unpkg.com/@modelcontextprotocol/sdk@0.6.0/app-with-deps";

        const app = new App({
            name: "voice-assistant-ui",
            version: "1.0.0"
        });

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const micBtn = document.getElementById('mic-btn');
        const statusEl = document.getElementById('status');
        const subStatusEl = document.getElementById('sub-status');
        const visualizer = document.getElementById('visualizer');
        const transcriptEl = document.getElementById('transcript');
        const initialQueryEl = document.getElementById('initial-query');
        const initialQueryContainer = document.getElementById('initial-query-container');

        // Create visualizer bars
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }

        const bars = document.querySelectorAll('.bar');

        app.connect().then(async () => {
            subStatusEl.textContent = "Ready";
            
            // Try to get initial context/query if the host supports it
            // In some implementations, the host might send an initial message
            // or we can call a tool to get the current goal.
        }).catch(err => {
            console.error("MCP Connection failed", err);
            subStatusEl.textContent = "Connection Failed";
        });

        micBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = processAudio;

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('active');
                statusEl.textContent = "Listening...";
                subStatusEl.textContent = "Recording your voice";
                
                startVisualizer(stream);
            } catch (err) {
                console.error("Mic access denied", err);
                statusEl.textContent = "Error";
                subStatusEl.textContent = "Microphone access denied";
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('active');
            statusEl.textContent = "Processing...";
            subStatusEl.textContent = "Analyzing audio";
            stopVisualizer();
        }

        async function processAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                
                try {
                    // Send to MCP Server
                    const result = await app.callServerTool({
                        name: "process-voice",
                        arguments: {
                            audio: base64Audio
                        }
                    });

                    if (result && result.content) {
                        const response = result.content[0].text;
                        transcriptEl.textContent = response;
                        
                        // If there is audio in the response (hypothetical extension)
                        // we would play it here.
                        statusEl.textContent = "Assistant Replied";
                        subStatusEl.textContent = "Task complete";
                    }
                } catch (err) {
                    console.error("Tool call failed", err);
                    statusEl.textContent = "Error";
                    subStatusEl.textContent = "Could not process audio";
                }
            };
        }

        let audioContext, analyser, dataArray, animationId;

        function startVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            function update() {
                analyser.getByteFrequencyData(dataArray);
                for (let i = 0; i < bars.length; i++) {
                    const value = dataArray[i] / 2;
                    bars[i].style.height = Math.max(10, value) + 'px';
                }
                animationId = requestAnimationFrame(update);
            }
            update();
        }

        function stopVisualizer() {
            cancelAnimationFrame(animationId);
            bars.forEach(bar => bar.style.height = '10px');
            if (audioContext) audioContext.close();
        }
    </script>
</body>
</html>
