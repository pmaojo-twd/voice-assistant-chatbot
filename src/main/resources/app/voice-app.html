<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant - MCP App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .visualizer {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 20px 0;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: var(--primary);
            border-radius: 2px;
            transition: height 0.1s ease;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .sub-status {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--primary-glow);
            margin: 0 auto;
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .mic-button.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .initial-query {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: left;
        }

        .transcript {
            margin-top: 16px;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        /* SVG Icons */
        .icon { width: 32px; height: 32px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status" id="status">Voice Assistant</div>
        <div class="sub-status" id="sub-status">Initializing...</div>

        <div class="visualizer" id="visualizer">
            <!-- Bars will be generated by JS -->
        </div>

        <button class="mic-button" id="mic-btn">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>

        <div class="transcript" id="transcript"></div>

        <div class="initial-query" id="initial-query-container" style="display: none;">
            <strong>Contexto:</strong> <span id="initial-query"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js"></script>
    <script type="module">
        import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.7.0/app-with-deps";

        const app = new App({
            name: "voice-assistant-ui",
            version: "1.0.0"
        });

        const params = new URLSearchParams(window.location.search);
        const PUBLIC_BACKEND = 'https://marvin.pelayomaojo.es';
        const isHttpOrigin = window.location.protocol === 'http:' || window.location.protocol === 'https:';
        const sameOriginCandidate = isHttpOrigin ? window.location.origin : null;
        const backendBaseUrl = params.get('backend')
            || (sameOriginCandidate && /marvin\.pelayomaojo\.es|localhost/.test(sameOriginCandidate) ? sameOriginCandidate : PUBLIC_BACKEND);

        // --- Reenvío de logs del navegador al backend (centralizador) ---
        (function installLogForwarder() {
            const levels = ['log', 'info', 'warn', 'error', 'debug'];
            const original = {};
            const send = (level, args) => {
                try {
                    const message = args.map(a => {
                        if (a instanceof Error) return a.stack || a.message;
                        if (typeof a === 'object') { try { return JSON.stringify(a); } catch { return String(a); } }
                        return String(a);
                    }).join(' ');
                    fetch(backendBaseUrl + '/api/logs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ level: level === 'log' ? 'info' : level, message, source: 'voice-app.html' }),
                        keepalive: true
                    }).catch(() => {});
                } catch {}
            };
            levels.forEach(lvl => {
                original[lvl] = console[lvl].bind(console);
                console[lvl] = (...args) => { send(lvl, args); original[lvl](...args); };
            });
            window.addEventListener('error', e => send('error', [e.message, e.filename + ':' + e.lineno]));
            window.addEventListener('unhandledrejection', e => send('error', ['unhandledrejection', e.reason]));
        })();

        let vadInstance = null;
        let isListening = false;
        let isBusy = false;

        const micBtn = document.getElementById('mic-btn');
        const statusEl = document.getElementById('status');
        const subStatusEl = document.getElementById('sub-status');
        const visualizer = document.getElementById('visualizer');
        const transcriptEl = document.getElementById('transcript');
        const initialQueryEl = document.getElementById('initial-query');
        const initialQueryContainer = document.getElementById('initial-query-container');

        // Create visualizer bars
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }

        const bars = document.querySelectorAll('.bar');

        app.ontoolinput = (input) => {
            const query = input?.arguments?.initialQuery;
            if (query) {
                initialQueryEl.textContent = query;
                initialQueryContainer.style.display = 'block';
            }
        };

        app.connect().then(async () => {
            subStatusEl.textContent = "Ready";
        }).catch(err => {
            console.error("MCP Connection failed", err);
            subStatusEl.textContent = "Ready for local demo";
        });

        micBtn.addEventListener('click', toggleListening);

        async function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                await startListening();
            }
        }

        async function startListening() {
            try {
                if (!vadInstance) {
                    statusEl.textContent = "Loading…";
                    subStatusEl.textContent = "Initializing voice detector";
                    const cdn = "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/";
                    vadInstance = await vad.MicVAD.new({
                        baseAssetPath: cdn,
                        onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/",
                        positiveSpeechThreshold: 0.7,
                        negativeSpeechThreshold: 0.5,
                        minSpeechFrames: 4,
                        redemptionFrames: 12,
                        onSpeechStart: () => {
                            if (isBusy) return;
                            statusEl.textContent = "Listening…";
                            subStatusEl.textContent = "Speech detected";
                        },
                        onSpeechEnd: async (audio) => {
                            if (isBusy) return;
                            isBusy = true;
                            try {
                                statusEl.textContent = "Processing…";
                                subStatusEl.textContent = "Sending to backend";
                                await sendUtterance(audio);
                            } finally {
                                isBusy = false;
                                if (isListening) {
                                    statusEl.textContent = "Listening…";
                                    subStatusEl.textContent = "Channel open";
                                }
                            }
                        },
                        onVADMisfire: () => {
                            if (isListening && !isBusy) {
                                subStatusEl.textContent = "Channel open";
                            }
                        }
                    });
                }
                vadInstance.start();
                isListening = true;
                micBtn.classList.add('active');
                statusEl.textContent = "Listening…";
                subStatusEl.textContent = "Channel open";
            } catch (err) {
                console.error("VAD init failed", err);
                statusEl.textContent = "Error";
                subStatusEl.textContent = "Microphone or VAD failed";
            }
        }

        function stopListening() {
            if (vadInstance) vadInstance.pause();
            isListening = false;
            micBtn.classList.remove('active');
            statusEl.textContent = "Idle";
            subStatusEl.textContent = "Channel closed";
        }

        async function sendUtterance(float32Pcm16k) {
            const wavBlob = encodeWav(float32Pcm16k, 16000);
            const base64Audio = await blobToBase64(wavBlob);
            try {
                const response = await fetch(`${backendBaseUrl}/api/voice/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: base64Audio, mimeType: 'audio/wav' })
                });
                if (!response.ok) throw new Error(`Backend returned ${response.status}`);
                const result = await response.json();
                transcriptEl.textContent = result.text || '';
                playAssistantAudio(result.audio, result.audioMimeType || 'audio/wav');
            } catch (err) {
                console.error("Voice processing failed", err);
                subStatusEl.textContent = "Backend error: " + err.message;
            }
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(String(reader.result).split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function encodeWav(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, samples.length * 2, true);
            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        function playAssistantAudio(base64Audio, mimeType) {
            if (!base64Audio) {
                return;
            }

            const audio = new Audio(`data:${mimeType};base64,${base64Audio}`);
            audio.play().catch(err => {
                console.warn("Audio playback failed", err);
            });
        }

        function preferredRecordingMimeType() {
            const candidates = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=opus',
                'audio/mp4'
            ];

            return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
        }

        let audioContext, analyser, dataArray, animationId;

        function startVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            function update() {
                analyser.getByteFrequencyData(dataArray);
                for (let i = 0; i < bars.length; i++) {
                    const value = dataArray[i] / 2;
                    bars[i].style.height = Math.max(10, value) + 'px';
                }
                animationId = requestAnimationFrame(update);
            }
            update();
        }

        function stopVisualizer() {
            cancelAnimationFrame(animationId);
            bars.forEach(bar => bar.style.height = '10px');
            if (audioContext) audioContext.close();
        }
    </script>
</body>
</html>
